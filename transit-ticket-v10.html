<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Ticket">
<title>Transit Ticket</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:-apple-system,'Helvetica Neue',sans-serif; }

.wrap {
  width:100%;
  height:100dvh;
  display:flex;
  flex-direction:column;
  background:#000;
  overflow:hidden;
  /* NO safe-area padding — we want full bleed like the original app */
}

/* ── TICKET AREA: 78.55% of screen height ── */
.ticket-area {
  position:relative;
  width:100%;
  flex: 0 0 78.55%;
  overflow:hidden;
}

/* Each slide image fills the ticket area exactly */
.slide {
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity 0.5s ease;
}
.slide.active { opacity:1; }
.slide img {
  width:100%;
  height:100%;
  object-fit:fill;   /* stretch to fill — correct since we cropped to exact ratio */
  display:block;
  pointer-events:none;
  -webkit-user-drag:none;
}

/* ── FOOTER: 21.45% of screen height, pure black ── */
.footer {
  flex: 0 0 21.45%;
  background:#000;
  position:relative;
  display:flex;
  flex-direction:column;
}

/* Timestamp main: center at 34.4% into footer */
.ts-main {
  position:absolute;
  left:0; right:0;
  top:34.4%;
  transform:translateY(-50%);
  text-align:center;
  font-weight:800;
  color:#fff;
  letter-spacing:-0.02em;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
  line-height:1;
  /* font-size = 16.2% of footer height → set by JS */
}

/* Expiration label: center at 82.1% into footer */
.ts-label {
  position:absolute;
  left:0; right:0;
  top:82.1%;
  transform:translateY(-50%);
  text-align:center;
  font-weight:500;
  color:#999;
  white-space:nowrap;
  line-height:1;
  /* font-size = 7.4% of footer height → set by JS */
}

/* PWA hint */
.hint {
  position:fixed;
  bottom:16px;
  left:50%; transform:translateX(-50%);
  background:rgba(10,10,10,0.92);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:22px;
  padding:10px 22px;
  color:rgba(255,255,255,0.85);
  font-size:12px; font-weight:500;
  white-space:nowrap;
  z-index:200;
  pointer-events:none;
  animation:hIn 0.6s ease 1s both, hOut 0.5s ease 9s forwards;
}
@keyframes hIn  { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
@keyframes hOut { to{opacity:0;transform:translateX(-50%) translateY(8px)} }
</style>
</head>

(function(){
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const ts = pad(now.getMonth()+1)+'/'+pad(now.getDate())+'/'+now.getFullYear()+
             ' '+pad(now.getHours())+':'+pad(now.getMinutes())+
             ' '+(now.getHours()>=12?'PM':'AM');
  document.getElementById('tsMain').textContent = ts;
})();

// Slideshow: 3 blue slides auto-rotate, green on tap
const blues = ['s0','s1','s2'].map(id => document.getElementById(id));
const green = document.getElementById('sG');
let cur = 0, greenOn = false, timer;

function showBlue(i) {
  blues.forEach(s => s.classList.remove('active'));
  blues[i].classList.add('active');
}

function nextBlue() {
  cur = (cur+1) % blues.length;
  showBlue(cur);
}

timer = setInterval(nextBlue, 2000);

document.getElementById('wrap').addEventListener('click', function() {
  if (!greenOn) {
    // First tap → show green, stop rotation
    greenOn = true;
    clearInterval(timer);
    blues.forEach(s => s.classList.remove('active'));
    green.classList.add('active');
  } else {
    // Tap again → back to blue rotation
    greenOn = false;
    green.classList.remove('active');
    showBlue(cur);
    timer = setInterval(nextBlue, 2000);
  }
});
</script>
</body>
</html>
