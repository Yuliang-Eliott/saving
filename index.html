<title>Transit Ticket</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:-apple-system,'Helvetica Neue',sans-serif; }

.wrap {
  width:100%;
  height:100dvh;
  display:flex;
  flex-direction:column;
  background:#000;
  overflow:hidden;
}

/* Ticket image area: 77.50% */
.ticket-area {
  position:relative;
  width:100%;
  flex: 0 0 77.50%;
  overflow:hidden;
}

.slide {
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity 0.5s ease;
}
.slide.active { opacity:1; }
.slide img {
  width:100%;
  height:100%;
  object-fit:fill;
  display:block;
  pointer-events:none;
  -webkit-user-drag:none;
}

/* Black footer: 22.50% */
.footer {
  flex: 0 0 22.50%;
  background:#000;
  position:relative;
}

.ts-main {
  position:absolute;
  left:0; right:0;
  top:34.4%;
  transform:translateY(-50%);
  text-align:center;
  font-weight:800;
  color:#fff;
  letter-spacing:-0.02em;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
  line-height:1;
}

.ts-label {
  position:absolute;
  left:0; right:0;
  top:82.1%;
  transform:translateY(-50%);
  text-align:center;
  font-weight:500;
  color:#999;
  white-space:nowrap;
  line-height:1;
}

.hint {
  position:fixed;
  bottom:16px;
  left:50%; transform:translateX(-50%);
  background:rgba(10,10,10,0.92);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:22px;
  padding:10px 22px;
  color:rgba(255,255,255,0.85);
  font-size:12px; font-weight:500;
  white-space:nowrap;
  z-index:200;
  pointer-events:none;
  animation:hIn 0.6s ease 1s both, hOut 0.5s ease 9s forwards;
}
@keyframes hIn  { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
@keyframes hOut { to{opacity:0;transform:translateX(-50%) translateY(8px)} }
</style>

  <div class="footer">
    <div class="ts-main"  id="tsMain"></div>
    <div class="ts-label">Expiration Date &amp; Time</div>
  </div>
</div>
<div class="hint" id="hint">📱 Safari/Edge → 分享 → 添加到主屏幕</div>

<script>
if (window.navigator.standalone) document.getElementById('hint').style.display='none';

function setFonts() {
  const footerH = window.innerHeight * 0.225;
  document.getElementById('tsMain').style.fontSize = (footerH * 0.162) + 'px';
  document.querySelectorAll('.ts-label').forEach(el => {
    el.style.fontSize = (footerH * 0.074) + 'px';
  });
}
setFonts();
window.addEventListener('resize', setFonts);

(function(){
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const ts = pad(now.getMonth()+1)+'/'+pad(now.getDate())+'/'+now.getFullYear()+
             ' '+pad(now.getHours())+':'+pad(now.getMinutes())+
             ' '+(now.getHours()>=12?'PM':'AM');
  document.getElementById('tsMain').textContent = ts;
})();

const blues = ['s0','s1','s2'].map(id => document.getElementById(id));
const green = document.getElementById('sG');
let cur = 0, greenOn = false, timer;

function showBlue(i) {
  blues.forEach(s => s.classList.remove('active'));
  blues[i].classList.add('active');
}

timer = setInterval(function() {
  cur = (cur+1) % blues.length;
  showBlue(cur);
}, 2000);

document.getElementById('wrap').addEventListener('click', function() {
  if (!greenOn) {
    greenOn = true;
    clearInterval(timer);
    blues.forEach(s => s.classList.remove('active'));
    green.classList.add('active');
  } else {
    greenOn = false;
    green.classList.remove('active');
    showBlue(cur);
    timer = setInterval(function() {
      cur = (cur+1) % blues.length;
      showBlue(cur);
    }, 2000);
  }
});
</script>
